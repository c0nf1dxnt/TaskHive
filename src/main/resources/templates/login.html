<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>
</head>
<body>
<p th:if="${error}" th:text="${error}" style="color: red;"></p>
<h1>Login</h1>
<form th:action="@{/login}" th:object="${userLoginDto}" method="post">
    <div>
        <label>Email:</label>
        <input type="email" th:field="*{email}">
        <span th:if="${#fields.hasErrors('email')}" th:errors="*{email}" style="color: red;"></span>
    </div>
    <div>
        <label>Password:</label>
        <input type="password" th:field="*{password}">
        <span th:if="${#fields.hasErrors('password')}" th:errors="*{password}" style="color: red;"></span>

    </div>
    <button type="submit">Login</button>
</form>
</body>
</html>
