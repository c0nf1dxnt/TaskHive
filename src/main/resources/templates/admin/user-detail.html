<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>User Management</title>
</head>
<body>
<h1 th:text="'User: ' + ${user.email}">User</h1>

<p th:if="${success}" th:text="${success}" style="color: green;"></p>

<p><strong>ID:</strong> <span th:text="${user.userId}"></span></p>
<p><strong>Display Name:</strong> <span th:text="${user.displayName ?: 'Not set'}"></span></p>
<p><strong>Active:</strong> <span th:text="${user.active ? 'Yes' : 'No'}"></span></p>
<p><strong>Created:</strong> <span th:text="${user.createdAt}"></span></p>

<h3>Roles</h3>
<ul>
    <li th:each="role : ${roles}">
        <span th:text="${role.globalRole.roleName}"></span>
        <small th:text="'(since ' + ${role.validFrom} + ')'"></small>
    </li>
</ul>
<p th:if="${#lists.isEmpty(roles)}">No roles assigned.</p>

<h3>Actions</h3>

<div>
    <form th:if="${user.active}"
          th:action="@{/admin/users/{id}/deactivate(id=${user.userId})}" method="post" style="display: inline;">
        <button type="submit" onclick="return confirm('Deactivate this user?')">Deactivate User</button>
    </form>
    <form th:if="${!user.active}"
          th:action="@{/admin/users/{id}/activate(id=${user.userId})}" method="post" style="display: inline;">
        <button type="submit">Activate User</button>
    </form>
</div>

<div style="margin-top: 10px;">
    <form th:if="${!isAdmin}"
          th:action="@{/admin/users/{id}/grant-admin(id=${user.userId})}" method="post" style="display: inline;">
        <button type="submit">Grant Admin</button>
    </form>
    <form th:if="${isAdmin}"
          th:action="@{/admin/users/{id}/revoke-admin(id=${user.userId})}" method="post" style="display: inline;">
        <button type="submit" onclick="return confirm('Revoke admin role?')">Revoke Admin</button>
    </form>
</div>

<hr/>
<a href="/admin">Back to admin panel</a>
</body>
</html>
