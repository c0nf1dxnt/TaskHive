<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Panel</title>
</head>
<body>
<h1>Admin Panel</h1>
<a href="/workspaces">Back to workspaces</a>

<h2>All Users</h2>
<table>
    <thead>
        <tr>
            <th>ID</th>
            <th>Email</th>
            <th>Display Name</th>
            <th>Active</th>
            <th>Created</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        <tr th:each="user : ${users}">
            <td th:text="${user.userId}"></td>
            <td th:text="${user.email}"></td>
            <td th:text="${user.displayName ?: '-'}"></td>
            <td th:text="${user.active ? 'Yes' : 'No'}"
                th:style="${user.active ? '' : 'color: red;'}"></td>
            <td th:text="${user.createdAt}"></td>
            <td>
                <a th:href="@{/admin/users/{id}(id=${user.userId})}">Manage</a>
            </td>
        </tr>
    </tbody>
</table>
</body>
</html>
