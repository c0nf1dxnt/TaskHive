<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Tasks</title>
</head>
<body>
<h1>Tasks</h1>
<a th:href="@{/workspaces/{wId}/projects/{pId}/tasks/create(wId=${workspaceId}, pId=${projectId})}">Create Task</a>
<div th:each="task : ${tasks}">
    <h3 th:text="${task.title}"></h3>
    <p th:text="${task.description}"></p>
    <span th:text="'Status: ' + ${task.status.name}"></span>
    <span th:text="'Priority: ' + ${task.priority}"></span>
</div>
<p th:if="${#lists.isEmpty(tasks)}">No tasks yet.</p>
<a th:href="@{/workspaces/{id}(id=${workspaceId})}">Back to projects</a>
</body>
</html>
